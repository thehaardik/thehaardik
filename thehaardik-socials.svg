<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 80" width="860" height="80">
<rect width="860" height="80" rx="6" fill="#0a0e14"/>
<rect x="0.5" y="0.5" width="859" height="79" rx="6" fill="none" stroke="#1a2332"/>

<!-- Top accent -->
<rect x="0" y="0" width="860" height="1" fill="#00ff88" opacity="0.3"/>

<!-- Corner brackets -->
<g stroke="#00ff88" stroke-width="1" fill="none" opacity="0.3">
  <path d="M10,10 L10,25 M10,10 L25,10"/>
  <path d="M850,10 L850,25 M850,10 L835,10"/>
  <path d="M10,70 L10,55 M10,70 L25,70"/>
  <path d="M850,70 L850,55 M850,70 L835,70"/>
</g>

<!-- Label -->
<text x="40" y="48" font-size="10" fill="#484f58" font-family="monospace" letter-spacing="2" opacity="0">
  echo $CONTACT
  <animate attributeName="opacity" from="0" to="0.5" dur="0.3s" begin="0.2s" fill="freeze"/>
</text>

<!-- LinkedIn -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
  <rect x="220" y="25" width="140" height="30" rx="4" fill="#0d1117" stroke="#1a2332"/>
  <rect x="220" y="25" width="3" height="30" rx="1" fill="#0077B5"/>
  <text x="240" y="44" font-size="11" fill="#c9d1d9" font-family="monospace">LinkedIn</text>
  <circle cx="345" cy="40" r="2" fill="#00ff88" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Email -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
  <rect x="380" y="25" width="140" height="30" rx="4" fill="#0d1117" stroke="#1a2332"/>
  <rect x="380" y="25" width="3" height="30" rx="1" fill="#D14836"/>
  <text x="400" y="44" font-size="11" fill="#c9d1d9" font-family="monospace">Email</text>
  <circle cx="505" cy="40" r="2" fill="#00ff88" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- GitHub -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
  <rect x="540" y="25" width="140" height="30" rx="4" fill="#0d1117" stroke="#1a2332"/>
  <rect x="540" y="25" width="3" height="30" rx="1" fill="#c9d1d9"/>
  <text x="560" y="44" font-size="11" fill="#c9d1d9" font-family="monospace">GitHub</text>
  <circle cx="665" cy="40" r="2" fill="#00ff88" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Status line -->
<text x="720" y="48" font-size="9" fill="#39d353" font-family="monospace" opacity="0">
  <animate attributeName="opacity" from="0" to="0.7" dur="0.3s" begin="1.1s" fill="freeze"/>
  STILL LEARNING
</text>

</svg>