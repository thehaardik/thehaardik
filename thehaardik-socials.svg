<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 120" width="860" height="120">
<rect width="860" height="120" rx="6" fill="#0a0e14"/>
<rect x="0.5" y="0.5" width="859" height="119" rx="6" fill="none" stroke="#1a2332"/>

<!-- Top accent -->
<rect x="0" y="0" width="860" height="1" fill="#00ff88" opacity="0.3"/>

<!-- Corner brackets — same style as projects -->
<g stroke="#00ff88" stroke-width="1.5" fill="none" opacity="0.4">
  <path d="M15,15 L15,40 M15,15 L40,15"/>
  <path d="M845,15 L845,40 M845,15 L820,15"/>
  <path d="M15,105 L15,80 M15,105 L40,105"/>
  <path d="M845,105 L845,80 M845,105 L820,105"/>
</g>

<!-- Label -->
<text x="50" y="55" font-size="10" fill="#484f58" font-family="monospace" letter-spacing="2" opacity="0">
  echo $CONTACT
  <animate attributeName="opacity" from="0" to="0.5" dur="0.3s" begin="0.2s" fill="freeze"/>
</text>

<!-- LinkedIn -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
  <rect x="240" y="32" width="130" height="36" rx="4" fill="#0d1117" stroke="#1a2332"/>
  <rect x="240" y="32" width="3" height="36" rx="1" fill="#0077B5"/>
  <text x="260" y="55" font-size="11" fill="#c9d1d9" font-family="monospace">LinkedIn</text>
  <circle cx="355" cy="50" r="2" fill="#00ff88" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Email -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
  <rect x="390" y="32" width="130" height="36" rx="4" fill="#0d1117" stroke="#1a2332"/>
  <rect x="390" y="32" width="3" height="36" rx="1" fill="#D14836"/>
  <text x="410" y="55" font-size="11" fill="#c9d1d9" font-family="monospace">Email</text>
  <circle cx="505" cy="50" r="2" fill="#00ff88" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- GitHub -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
  <rect x="540" y="32" width="130" height="36" rx="4" fill="#0d1117" stroke="#1a2332"/>
  <rect x="540" y="32" width="3" height="36" rx="1" fill="#c9d1d9"/>
  <text x="560" y="55" font-size="11" fill="#c9d1d9" font-family="monospace">GitHub</text>
  <circle cx="655" cy="50" r="2" fill="#00ff88" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Status -->
<text x="710" y="55" font-size="9" fill="#39d353" font-family="monospace" opacity="0">
  <animate attributeName="opacity" from="0" to="0.7" dur="0.3s" begin="1.1s" fill="freeze"/>
  STILL LEARNING
</text>

</svg>
