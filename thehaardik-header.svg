<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="860" height="320">
<defs>
  <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#58a6ff"/>
    <stop offset="100%" stop-color="#39d353"/>
  </linearGradient>
  <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#39d353" stop-opacity="0.05"/>
  </linearGradient>
</defs>

<style>
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes lineGrow { from{width:0} to{width:100%} }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .fade { opacity:0; animation: fadeIn 0.5s ease-out forwards; }
  .d1 { animation-delay: 0.1s; }
  .d2 { animation-delay: 0.25s; }
  .d3 { animation-delay: 0.4s; }
  .d4 { animation-delay: 0.55s; }
  .d5 { animation-delay: 0.7s; }
  .d6 { animation-delay: 0.85s; }
  .d7 { animation-delay: 1.0s; }
  .d8 { animation-delay: 1.15s; }
  .pulse { animation: pulse 2s ease-in-out infinite; }
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .mono { font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace; }
</style>

<rect width="860" height="320" rx="6" fill="#0d1117"/>
<rect x="0.5" y="0.5" width="859" height="319" rx="6" fill="none" stroke="#21262d"/>

<!-- Top accent -->
<rect x="0" y="0" width="860" height="2" rx="1" fill="url(#grad)"/>

<!-- Left section -->
<g>
  <text x="48" y="65" font-size="28" font-weight="600" fill="#f0f6fc" class="fade d1">Hardik Miglani</text>
  <text x="48" y="92" font-size="14" fill="#8b949e" class="fade d2">Technical Program Manager @ Kodo</text>
  
  <!-- Divider -->
  <rect x="48" y="108" width="120" height="1" fill="#21262d" class="fade d3"/>
  
  <!-- Info -->
