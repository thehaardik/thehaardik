<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300">
<rect width="860" height="300" rx="6" fill="#0d1117"/>
<rect x="0.5" y="0.5" width="859" height="299" rx="6" fill="none" stroke="#21262d"/>

<!-- Top accent line - wipes in -->
<rect x="0" y="0" width="0" height="2" fill="#58a6ff">
  <animate attributeName="width" from="0" to="860" dur="0.8s" fill="freeze"/>
</rect>

<!-- Name - fades in -->
<text x="48" y="60" font-size="28" font-weight="600" fill="#f0f6fc" font-family="system-ui,sans-serif" opacity="0">
  Hardik Miglani
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze"/>
</text>

<!-- Role - fades in -->
<text x="48" y="85" font-size="14" fill="#8b949e" font-family="system-ui,sans-serif" opacity="0">
  Technical Program Manager @ Kodo
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>
</text>

<!-- Divider - wipes in -->
<rect x="48" y="100" width="0" height="1" fill="#21262d">
  <animate attributeName="width" from="0" to="120" dur="0.4s" begin="0.6s" fill="freeze"/>
</rect>

<!-- STACK -->
<text x="48" y="130" font-size="12" fill="#484f58" font-family="monospace" opacity="0">STACK
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
</text>
<text x="140" y="130" font-size="12" fill="#c9d1d9" font-family="system-ui,sans-serif" opacity="0">Python, Node.js, SQL, REST APIs, AI Agents
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
</text>

<!-- DOMAIN -->
<text x="48" y="155" font-size="12" fill="#484f58" font-family="monospace" opacity="0">DOMAIN
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
</text>
<text x="140" y="155" font-size="12" fill="#c9d1d9" font-family="system-ui,sans-serif" opacity="0">Fixed Income, Credit Cards, Prepaid Instruments
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
</text>

<!-- INFRA -->
<text x="48" y="180" font-size="12" fill="#484f58" font-family="monospace" opacity="0">INFRA
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.1s" fill="freeze"/>
</text>
<text x="140" y="180" font-size="12" fill="#c9d1d9" font-family="system-ui,sans-serif" opacity="0">Banking Infra, Connected Banking, Reconciliation
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.1s" fill="freeze"/>
</text>

<!-- STATUS -->
<text x="48" y="205" font-size="12" fill="#484f58" font-family="monospace" opacity="0">STATUS
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.3s" fill="freeze"/>
</text>
<text x="140" y="205" font-size="12" fill="#c9d1d9" font-family="system-ui,sans-serif" opacity="0">Still learning, always building.
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.3s" fill="freeze"/>
</text>

