    <text x="48" y="140" font-size="12" fill="#484f58" class="mono">STACK</text>
    <text x="148" y="140" font-size="12" fill="#c9d1d9">Python, Node.js, SQL, REST APIs, AI Agents</text>
  </g>
  <g class="fade d5">
    <text x="48" y="165" font-size="12" fill="#484f58" class="mono">DOMAIN</text>
    <text x="148" y="165" font-size="12" fill="#c9d1d9">Fixed Income, Credit Cards, Prepaid Instruments</text>
  </g>
  <g class="fade d6">
