<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 310" width="860" height="310">
<defs>
  <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00ff88" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="860" height="310" rx="6" fill="#0a0e14"/>
<rect x="0.5" y="0.5" width="859" height="309" rx="6" fill="none" stroke="#1a2332"/>

<!-- Grid -->
<g opacity="0.05" stroke="#00ff88" stroke-width="0.3">
  <line x1="0" y1="50" x2="860" y2="50"/>
  <line x1="0" y1="100" x2="860" y2="100"/>
  <line x1="0" y1="150" x2="860" y2="150"/>
  <line x1="0" y1="200" x2="860" y2="200"/>
  <line x1="0" y1="250" x2="860" y2="250"/>
  <line x1="200" y1="0" x2="200" y2="310"/>
  <line x1="400" y1="0" x2="400" y2="310"/>
  <line x1="600" y1="0" x2="600" y2="310"/>
  <line x1="800" y1="0" x2="800" y2="310"/>
</g>

<!-- Scan line -->
<g opacity="0.12">
  <animateTransform attributeName="transform" type="translate" values="0 -10;0 320" dur="4s" repeatCount="indefinite"/>
  <rect x="0" y="0" width="860" height="2" fill="url(#glow)"/>
</g>

<!-- Matrix rain left -->
<g font-size="9" fill="#00ff88" opacity="0.1">
  <text x="12" y="20">01001</text><text x="12" y="35">10110</text><text x="12" y="50">01101</text>
  <text x="12" y="65">11001</text><text x="12" y="80">00110</text><text x="12" y="95">10101</text>
  <text x="12" y="110">01011</text><text x="12" y="125">11010</text><text x="12" y="140">00101</text>
  <text x="12" y="155">10011</text><text x="12" y="170">01110</text><text x="12" y="185">11000</text>
  <text x="12" y="200">01010</text><text x="12" y="215">10101</text><text x="12" y="230">00110</text>
  <text x="12" y="245">11010</text><text x="12" y="260">01001</text><text x="12" y="275">10110</text>
  <animateTransform attributeName="transform" type="translate" values="0 0;0 -15" dur="3s" repeatCount="indefinite"/>
</g>

<!-- Matrix rain right -->
<g font-size="9" fill="#00ff88" opacity="0.1">
  <text x="815" y="20">10110</text><text x="815" y="35">01001</text><text x="815" y="50">11010</text>
  <text x="815" y="65">00101</text><text x="815" y="80">10101</text><text x="815" y="95">01010</text>
  <text x="815" y="110">11001</text><text x="815" y="125">00110</text><text x="815" y="140">10011</text>
  <text x="815" y="155">01101</text><text x="815" y="170">11010</text><text x="815" y="185">00101</text>
  <text x="815" y="200">10110</text><text x="815" y="215">01001</text><text x="815" y="230">11001</text>
  <text x="815" y="245">00110</text><text x="815" y="260">10101</text><text x="815" y="275">01011</text>
  <animateTransform attributeName="transform" type="translate" values="0 0;0 -15" dur="3.5s" repeatCount="indefinite"/>
</g>

<!-- Corner brackets -->
<g stroke="#00ff88" stroke-width="1.5" fill="none" opacity="0.5">
  <path d="M15,15 L15,40 M15,15 L40,15"/>
  <path d="M845,15 L845,40 M845,15 L820,15"/>
  <path d="M15,295 L15,270 M15,295 L40,295"/>
  <path d="M845,295 L845,270 M845,295 L820,295"/>
</g>

<!-- HARDIK glitch -->
<g font-size="42" font-weight="bold" fill="#00ff88" font-family="monospace">
  <text x="60" y="85" opacity="0.12">
    HARDIK
    <animateTransform attributeName="transform" type="translate" values="0,0;-2,1;0,0;2,-1;0,0" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="62" y="83" opacity="0.08" fill="#ff0040">
    HARDIK
    <animateTransform attributeName="transform" type="translate" values="0,0;3,-1;0,0;-2,1;0,0" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="61" y="84" opacity="0.9">HARDIK</text>
</g>

<!-- MIGLANI -->
<text x="61" y="105" font-size="13" fill="#484f58" font-family="monospace" letter-spacing="8" opacity="0">
  MIGLANI
  <animate attributeName="opacity" from="0" to="0.7" dur="0.3s" begin="0.4s" fill="freeze"/>
</text>

<!-- Underline -->
<line x1="61" y1="118" x2="350" y2="118" stroke="#00ff88" stroke-width="1.5" opacity="0">
  <animate attributeName="opacity" from="0" to="0.6" dur="0.3s" begin="0.5s" fill="freeze"/>
  <animate attributeName="x2" from="61" to="350" dur="0.5s" begin="0.5s" fill="freeze"/>
</line>
<line x1="61" y1="118" x2="350" y2="118" stroke="#00ff88" stroke-width="5" opacity="0" filter="url(#glow)">
  <animate attributeName="opacity" from="0" to="0.2" dur="0.3s" begin="0.5s" fill="freeze"/>
  <animate attributeName="x2" from="61" to="350" dur="0.5s" begin="0.5s" fill="freeze"/>
</line>

<!-- Info panel -->
<rect x="60" y="135" width="740" height="140" rx="4" fill="#0d1117" stroke="#1a2332" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
</rect>

<!-- Panel header -->
<rect x="60" y="135" width="740" height="22" rx="4" fill="#0a0e14" opacity="0">
  <animate attributeName="opacity" from="0" to="0.8" dur="0.3s" begin="0.7s" fill="freeze"/>
</rect>
<text x="75" y="150" font-size="9" fill="#484f58" font-family="monospace" opacity="0">
  PROFILE.SYS
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
</text>
<circle cx="820" cy="146" r="3" fill="#39d353" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
  <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
</circle>

<!-- Info rows -->
<g font-size="11" font-family="monospace">
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="0.9s" fill="freeze"/>
    <rect x="75" y="170" width="3" height="12" fill="#00ff88"/>
    <text x="88" y="180" fill="#00ff88">ROLE</text>
    <text x="150" y="180" fill="#c9d1d9" font-family="system-ui,sans-serif">Technical Program Manager @ Kodo</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.1s" fill="freeze"/>
    <rect x="75" y="195" width="3" height="12" fill="#58a6ff"/>
    <text x="88" y="205" fill="#58a6ff">STACK</text>
    <text x="150" y="205" fill="#c9d1d9" font-family="system-ui,sans-serif">Python, Node.js, SQL, REST APIs, AI Agents</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.3s" fill="freeze"/>
    <rect x="75" y="220" width="3" height="12" fill="#f0883e"/>
    <text x="88" y="230" fill="#f0883e">DOMAIN</text>
    <text x="150" y="230" fill="#c9d1d9" font-family="system-ui,sans-serif">Fixed Income, Credit Cards, Prepaid Instruments</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.5s" fill="freeze"/>
    <rect x="75" y="245" width="3" height="12" fill="#bc8cff"/>
    <text x="88" y="255" fill="#bc8cff">INFRA</text>
    <text x="150" y="255" fill="#c9d1d9" font-family="system-ui,sans-serif">Banking Infra, Connected Banking, Reconciliation</text>
  </g>
</g>

<!-- Floating particles -->
<circle cx="200" cy="270" r="1" fill="#00ff88" opacity="0.4">
  <animate attributeName="cy" values="270;50" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0" dur="5s" repeatCount="indefinite"/>
</circle>
<circle cx="450" cy="280" r="1" fill="#00ff88" opacity="0.3">
  <animate attributeName="cy" values="280;30" dur="6s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.3;0" dur="6s" repeatCount="indefinite"/>
</circle>
<circle cx="700" cy="260" r="1" fill="#00ff88" opacity="0.5">
  <animate attributeName="cy" values="260;20" dur="4.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.5;0" dur="4.5s" repeatCount="indefinite"/>
</circle>

</svg>
