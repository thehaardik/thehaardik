<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="860" height="280">
<defs>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#58a6ff"/>
    <stop offset="100%" stop-color="#39d353"/>
  </linearGradient>
</defs>

<style>
  @keyframes cursor { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes lineGrow { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .cursor { animation: cursor 1s step-end infinite; }
  .line-anim { stroke-dasharray:200; stroke-dashoffset:200; animation: lineGrow 1s ease-out 0.3s forwards; }
  .fade { opacity:0; animation: fadeIn 0.6s ease-out forwards; }
  .f1 { animation-delay: 0.2s; }
  .f2 { animation-delay: 0.5s; }
  .f3 { animation-delay: 0.8s; }
  .f4 { animation-delay: 1.1s; }
  .f5 { animation-delay: 1.4s; }
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .mono { font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace; }
</style>

<rect width="860" height="280" rx="6" fill="#0d1117"/>
<rect x="0.5" y="0.5" width="859" height="279" rx="6" fill="none" stroke="#21262d"/>

<!-- Top accent line -->
<line x1="0" y1="1" x2="860" y2="1" stroke="url(#accent)" stroke-width="2"/>

<!-- Name -->
<text x="40" y="60" font-size="32" font-weight="600" fill="#f0f6fc" class="fade f1">Hardik Miglani</text>

<!-- Role -->
<text x="40" y="88" font-size="15" fill="#8b949e" class="fade f2">Technical Program Manager @ Kodo</text>

<!-- Divider -->
<line x1="40" y1="105" x2="240" y2="105" stroke="#21262d" stroke-width="1" class="line-anim"/>

<!-- Info rows -->
<g font-size="13" class="fade f3">
  <text x="40" y="135" fill="#58a6ff">Stack</text>
  <text x="130" y="135" fill="#8b949e">Python, Node.js, SQL, REST APIs, AI Agents</text>
</g>
<g font-size="13" class="fade f4">
  <text x="40" y="160" fill="#58a6ff">Domain</text>
  <text x="130" y="160" fill="#8b949e">Fixed Income, Credit Cards, Prepaid Instruments</text>
</g>
<g font-size="13" class="fade f4">
  <text x="40" y="185" fill="#58a6ff">Infra</text>
  <text x="130" y="185" fill="#8b949e">Banking Infra, Connected Banking, Reconciliation</text>
</g>
<g font-size="13" class="fade f5">
  <text x="40" y="210" fill="#58a6ff">Status</text>
