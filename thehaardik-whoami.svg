<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300">
<rect width="860" height="300" rx="8" fill="#0d1117"/>
<rect x="0.5" y="0.5" width="859" height="299" rx="8" fill="none" stroke="#30363d" stroke-width="1"/>

<!-- Terminal dots -->
<circle cx="20" cy="18" r="6" fill="#ff5f57"/>
<circle cx="40" cy="18" r="6" fill="#febc2e"/>
<circle cx="60" cy="18" r="6" fill="#28c840"/>

<!-- Title bar -->
<text x="430" y="22" fill="#484f58" font-family="monospace" font-size="11" text-anchor="middle">hardik@github — zsh</text>

<!-- Prompt line with blinking cursor -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.2s" fill="freeze"/>
  <text x="16" y="60" fill="#7ee787" font-family="monospace" font-size="13">❯</text>
  <text x="32" y="60" fill="#c9d1d9" font-family="monospace" font-size="13">whoami</text>
  <rect x="88" y="47" width="8" height="15" fill="#c9d1d9" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- Name - types in letter by letter -->
<g font-family="monospace" font-size="20" font-weight="bold">
  <text x="16" y="105" fill="#58a6ff" opacity="0">H</text>
  <text x="32" y="105" fill="#58a6ff" opacity="0">A</text>
  <text x="48" y="105" fill="#58a6ff" opacity="0">R</text>
  <text x="64" y="105" fill="#58a6ff" opacity="0">D</text>
  <text x="80" y="105" fill="#58a6ff" opacity="0">I</text>
  <text x="92" y="105" fill="#58a6ff" opacity="0">K</text>
  <text x="112" y="105" fill="#58a6ff" opacity="0"> </text>
  <text x="120" y="105" fill="#58a6ff" opacity="0">M</text>
  <text x="138" y="105" fill="#58a6ff" opacity="0">I</text>
  <text x="148" y="105" fill="#58a6ff" opacity="0">G</text>
  <text x="164" y="105" fill="#58a6ff" opacity="0">L</text>
  <text x="176" y="105" fill="#58a6ff" opacity="0">A</text>
  <text x="192" y="105" fill="#58a6ff" opacity="0">N</text>
  <text x="208" y="105" fill="#58a6ff" opacity="0">I</text>
  
  <!-- Each letter fades in sequentially -->
  <text x="16" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.5s" fill="freeze"/>H</text>
  <text x="32" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.55s" fill="freeze"/>A</text>
  <text x="48" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.6s" fill="freeze"/>R</text>
  <text x="64" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.65s" fill="freeze"/>D</text>
  <text x="80" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.7s" fill="freeze"/>I</text>
  <text x="92" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.75s" fill="freeze"/>K</text>
  <text x="120" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.85s" fill="freeze"/>M</text>
  <text x="138" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.9s" fill="freeze"/>I</text>
  <text x="150" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.95s" fill="freeze"/>G</text>
  <text x="166" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.0s" fill="freeze"/>L</text>
  <text x="178" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.05s" fill="freeze"/>A</text>
  <text x="194" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.1s" fill="freeze"/>N</text>
  <text x="210" y="105" fill="#58a6ff"><animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.15s" fill="freeze"/>I</text>
</g>

<!-- Info lines with slide-in -->
<g font-family="monospace" font-size="13">
  <!-- Role -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.4s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-10 0" to="0 0" dur="0.2s" begin="1.4s" fill="freeze"/>
    <text x="16" y="140" fill="#7ee787">role</text>
    <text x="80" y="140" fill="#484f58">:</text>
    <text x="96" y="140" fill="#c9d1d9">Senior TPM @ Kodo | Fintech &amp; Payments</text>
  </g>
  
  <!-- Stack -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.6s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-10 0" to="0 0" dur="0.2s" begin="1.6s" fill="freeze"/>
    <text x="16" y="165" fill="#7ee787">stack</text>
    <text x="80" y="165" fill="#484f58">:</text>
    <text x="96" y="165" fill="#c9d1d9">Python, Node.js, SQL, REST APIs, AI Agents</text>
  </g>
  
  <!-- Focus -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.8s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-10 0" to="0 0" dur="0.2s" begin="1.8s" fill="freeze"/>
    <text x="16" y="190" fill="#7ee787">focus</text>
    <text x="80" y="190" fill="#484f58">:</text>
    <text x="96" y="190" fill="#c9d1d9">Banking Infra, Card Issuance, Reconciliation</text>
  </g>
  
  <!-- Highlights -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="2.0s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-10 0" to="0 0" dur="0.2s" begin="2.0s" fill="freeze"/>
    <text x="16" y="215" fill="#7ee787">highlights</text>
    <text x="120" y="215" fill="#484f58">:</text>
    <text x="136" y="215" fill="#c9d1d9">7+ Banking Integrations | 20% Faster Go-Live</text>
  </g>

  <!-- Repos -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="2.2s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-10 0" to="0 0" dur="0.2s" begin="2.2s" fill="freeze"/>
    <text x="16" y="240" fill="#7ee787">repos</text>
    <text x="80" y="240" fill="#484f58">:</text>
    <text x="96" y="240" fill="#c9d1d9">11 public repos | TypeScript, Python, HTML</text>
  </g>

  <!-- Status -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="2.4s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-10 0" to="0 0" dur="0.2s" begin="2.4s" fill="freeze"/>
    <text x="16" y="265" fill="#7ee787">status</text>
    <text x="80" y="265" fill="#484f58">:</text>
    <circle cx="100" cy="261" r="4" fill="#39d353"/>
    <text x="112" y="265" fill="#c9d1d9">Open to Opportunities</text>
  </g>
</g>

<!-- Bottom cursor blink -->
<rect x="16" y="278" width="8" height="15" fill="#7ee787" opacity="0.8">
  <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
</rect>

</svg>