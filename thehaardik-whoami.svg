<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400">
<defs>
  <!-- Scanline animation -->
  <clipPath id="scan-clip">
    <rect x="0" y="0" width="860" height="2">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 400" dur="3s" repeatCount="indefinite"/>
    </rect>
  </clipPath>
  
  <!-- Glitch flicker -->
  <filter id="glitch">
    <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="1" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs>

<!-- Background -->
<rect width="860" height="400" rx="8" fill="#0a0e14"/>
<rect x="0.5" y="0.5" width="859" height="399" rx="8" fill="none" stroke="#1a2332" stroke-width="1"/>

<!-- Grid lines (faint) -->
<g opacity="0.08" stroke="#00ff88" stroke-width="0.5">
  <line x1="0" y1="50" x2="860" y2="50"/>
  <line x1="0" y1="100" x2="860" y2="100"/>
  <line x1="0" y1="150" x2="860" y2="150"/>
  <line x1="0" y1="200" x2="860" y2="200"/>
  <line x1="0" y1="250" x2="860" y2="250"/>
  <line x1="0" y1="300" x2="860" y2="300"/>
  <line x1="0" y1="350" x2="860" y2="350"/>
  <line x1="100" y1="0" x2="100" y2="400"/>
  <line x1="200" y1="0" x2="200" y2="400"/>
  <line x1="300" y1="0" x2="300" y2="400"/>
  <line x1="400" y1="0" x2="400" y2="400"/>
  <line x1="500" y1="0" x2="500" y2="400"/>
  <line x1="600" y1="0" x2="600" y2="400"/>
  <line x1="700" y1="0" x2="700" y2="400"/>
  <line x1="800" y1="0" x2="800" y2="400"/>
</g>

<!-- Corner brackets -->
<g stroke="#00ff88" stroke-width="2" fill="none" opacity="0">
  <animate attributeName="opacity" from="0" to="0.6" dur="0.3s" begin="0.2s" fill="freeze"/>
  <!-- Top-left -->
  <path d="M20,20 L20,50 M20,20 L50,20"/>
  <!-- Top-right -->
  <path d="M840,20 L840,50 M840,20 L810,20"/>
  <!-- Bottom-left -->
  <path d="M20,380 L20,350 M20,380 L50,380"/>
  <!-- Bottom-right -->
  <path d="M840,380 L840,350 M840,380 L810,380"/>
</g>

<!-- Scanning line -->
<rect x="0" y="0" width="860" height="2" fill="#00ff88" opacity="0.15" clip-path="url(#scan-clip)"/>

<!-- Title: HARDIK MIGLANI - large ASCII art style -->
<g font-family="monospace" font-size="16" fill="#00ff88" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.3s" fill="freeze"/>
  
  <!-- H -->
  <text x="120" y="80">██╗  ██╗</text>
  <text x="120" y="96">██║  ██║</text>
  <text x="120" y="112">███████║</text>
  <text x="120" y="128">██╔══██║</text>
  <text x="120" y="144">██║  ██║</text>
  <text x="120" y="160">╚═╝  ╚═╝</text>
  
  <!-- A -->
  <text x="210" y="80"> █████╗ </text>
  <text x="210" y="96">██╔══██╗</text>
  <text x="210" y="112">███████║</text>
  <text x="210" y="128">██╔══██║</text>
  <text x="210" y="144">██║  ██║</text>
  <text x="210" y="160">╚═╝  ╚═╝</text>
  
  <!-- R -->
  <text x="310" y="80">██████╗ </text>
  <text x="310" y="96">██╔══██╗</text>
  <text x="310" y="112">██████╔╝</text>
  <text x="310" y="128">██╔══██╗</text>
  <text x="310" y="144">██║  ██║</text>
  <text x="310" y="160">╚═╝  ╚═╝</text>
  
  <!-- D -->
  <text x="410" y="80">██████╗ </text>
  <text x="410" y="96">██╔══██╗</text>
  <text x="410" y="112">██║  ██║</text>
  <text x="410" y="128">██║  ██║</text>
  <text x="410" y="144">██████╔╝</text>
  <text x="410" y="160">╚═════╝</text>
  
  <!-- I -->
  <text x="510" y="80">██╗</text>
  <text x="510" y="96">██║</text>
  <text x="510" y="112">██║</text>
  <text x="510" y="128">██║</text>
  <text x="510" y="144">██║</text>
  <text x="510" y="160">╚═╝</text>
  
  <!-- K -->
  <text x="560" y="80">██╗  ██╗</text>
  <text x="560" y="96">██║ ██╔╝</text>
  <text x="560" y="112">█████╔╝ </text>
  <text x="560" y="128">██╔═██╗ </text>
  <text x="560" y="144">██║  ██╗</text>
  <text x="560" y="160">╚═╝  ╚═╝</text>
</g>

<!-- Glowing underline -->
<line x1="120" y1="175" x2="640" y2="175" stroke="#00ff88" stroke-width="2" opacity="0">
  <animate attributeName="opacity" from="0" to="0.8" dur="0.3s" begin="0.8s" fill="freeze"/>
  <animate attributeName="x2" from="120" to="640" dur="0.5s" begin="0.8s" fill="freeze"/>
</line>

<!-- Data streams - left column -->
<g font-family="monospace" font-size="11" fill="#00ff88">
  <!-- Scrolling data -->
  <text x="20" y="200" opacity="0.4">01001010</text>
  <text x="20" y="215" opacity="0.3">11010011</text>
  <text x="20" y="230" opacity="0.5">00101101</text>
  <text x="20" y="245" opacity="0.2">10110100</text>
  <text x="20" y="260" opacity="0.4">01101001</text>
  <text x="20" y="275" opacity="0.3">11001010</text>
  <text x="20" y="290" opacity="0.5">00110101</text>
  <text x="20" y="305" opacity="0.2">10101100</text>
  
  <!-- Animate data scrolling -->
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -30" dur="2s" repeatCount="indefinite"/>
</g>

<!-- Data streams - right column -->
<g font-family="monospace" font-size="11" fill="#00ff88">
  <text x="780" y="200" opacity="0.4">10110100</text>
  <text x="780" y="215" opacity="0.3">01001011</text>
  <text x="780" y="230" opacity="0.5">11010010</text>
  <text x="780" y="245" opacity="0.2">00101101</text>
  <text x="780" y="260" opacity="0.4">10110100</text>
  <text x="780" y="275" opacity="0.3">01001011</text>
  <text x="780" y="290" opacity="0.5">11010010</text>
  <text x="780" y="305" opacity="0.2">00101101</text>
  
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -30" dur="2.5s" repeatCount="indefinite"/>
</g>

<!-- Center info panel -->
<g font-family="monospace" font-size="12">
  <!-- Panel border -->
  <rect x="140" y="195" width="580" height="130" rx="4" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" from="0" to="0.3" dur="0.3s" begin="1s" fill="freeze"/>
  </rect>
  
  <!-- Role -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.1s" fill="freeze"/>
    <text x="160" y="220" fill="#00ff88">▸ ROLE</text>
    <text x="300" y="220" fill="#c9d1d9">Senior Technical Program Manager</text>
  </g>
  
  <!-- Stack -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.3s" fill="freeze"/>
    <text x="160" y="245" fill="#00ff88">▸ STACK</text>
    <text x="300" y="245" fill="#c9d1d9">Python • Node.js • SQL • APIs • AI Agents</text>
  </g>
  
  <!-- Focus -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.5s" fill="freeze"/>
    <text x="160" y="270" fill="#00ff88">▸ FOCUS</text>
    <text x="300" y="270" fill="#c9d1d9">Banking Infra • Cards • Reconciliation • Treasury</text>
  </g>
  
  <!-- Status -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.7s" fill="freeze"/>
    <text x="160" y="295" fill="#00ff88">▸ STATUS</text>
    <circle cx="308" cy="291" r="4" fill="#39d353">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="320" y="295" fill="#39d353">OPEN TO OPPORTUNITIES</text>
  </g>
</g>

<!-- Bottom status bar -->
<g font-family="monospace" font-size="10" fill="#484f58">
  <text x="20" y="380">SYS:ONLINE</text>
  <text x="150" y="380">UPTIME:99.97%</text>
  <text x="320" y="380">REPOS:11</text>
  <text x="450" y="380">CONTRIB:31</text>
  
  <!-- Blinking dot -->
  <circle cx="600" cy="377" r="3" fill="#39d353">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="610" y="380">ACTIVE</text>
  
  <!-- Timestamp -->
  <text x="720" y="380" fill="#00ff88">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    ▮
  </text>
</g>

<!-- Floating particles -->
<g fill="#00ff88">
  <circle cx="100" cy="200" r="1" opacity="0.5">
    <animate attributeName="cy" from="200" to="50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.5" to="0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="350" r="1" opacity="0.5">
    <animate attributeName="cy" from="350" to="100" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.5" to="0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="300" r="1" opacity="0.5">
    <animate attributeName="cy" from="300" to="50" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.5" to="0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="250" r="1" opacity="0.5">
    <animate attributeName="cy" from="250" to="80" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.5" to="0" dur="4.5s" repeatCount="indefinite"/>
  </circle>
</g>

</svg>