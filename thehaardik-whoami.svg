<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340">
<style>
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  @keyframes slideRight { from{width:0} to{width:700} }
  @keyframes fadeSlide { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
  @keyframes scan { from{y:0} to{y:340} }
  @keyframes float { 0%{transform:translateY(0);opacity:0.6} 100%{transform:translateY(-200px);opacity:0} }
  .blink { animation: blink 1s infinite; }
  .pulse { animation: pulse 2s infinite; }
  .slide-line { animation: slideRight 0.8s ease-out 0.5s forwards; width:0; }
  .fade1 { animation: fadeSlide 0.3s ease-out 0.8s forwards; opacity:0; }
  .fade2 { animation: fadeSlide 0.3s ease-out 1.0s forwards; opacity:0; }
  .fade3 { animation: fadeSlide 0.3s ease-out 1.2s forwards; opacity:0; }
  .fade4 { animation: fadeSlide 0.3s ease-out 1.4s forwards; opacity:0; }
  .fade5 { animation: fadeSlide 0.3s ease-out 1.6s forwards; opacity:0; }
  .fade6 { animation: fadeSlide 0.3s ease-out 1.8s forwards; opacity:0; }
  text { font-family: 'Courier New', monospace; }
</style>

<!-- Background -->
<rect width="860" height="340" rx="8" fill="#0a0e14"/>
<rect x="0.5" y="0.5" width="859" height="339" rx="8" fill="none" stroke="#1a2332"/>

<!-- Grid -->
<g opacity="0.06" stroke="#00ff88" stroke-width="0.5">
  <line x1="0" y1="60" x2="860" y2="60"/><line x1="0" y1="120" x2="860" y2="120"/>
  <line x1="0" y1="180" x2="860" y2="180"/><line x1="0" y1="240" x2="860" y2="240"/>
  <line x1="0" y1="300" x2="860" y2="300"/>
  <line x1="150" y1="0" x2="150" y2="340"/><line x1="300" y1="0" x2="300" y2="340"/>
  <line x1="450" y1="0" x2="450" y2="340"/><line x1="600" y1="0" x2="600" y2="340"/>
  <line x1="750" y1="0" x2="750" y2="340"/>
</g>

<!-- Corner brackets -->
<g stroke="#00ff88" stroke-width="2" fill="none" opacity="0.5">
  <path d="M15,15 L15,45 M15,15 L45,15"/>
  <path d="M845,15 L845,45 M845,15 L815,15"/>
  <path d="M15,325 L15,295 M15,325 L45,325"/>
  <path d="M845,325 L845,295 M845,325 L815,325"/>
</g>

<!-- Scan line -->
<rect x="0" y="0" width="860" height="1" fill="#00ff88" opacity="0.12">
  <animateTransform attributeName="transform" type="translate" values="0 0;0 340" dur="4s" repeatCount="indefinite"/>
</rect>

<!-- HARDIK - block letters -->
<g font-size="14" fill="#00ff88" opacity="0.8">
  <text x="80" y="65">██╗  ██╗</text>
  <text x="80" y="80">██║  ██║</text>
  <text x="80" y="95">███████║</text>
  <text x="80" y="110">██╔══██║</text>
  <text x="80" y="125">██║  ██║</text>
  <text x="80" y="140">╚═╝  ╚═╝</text>
  
  <text x="175" y="65"> █████╗ </text>
  <text x="175" y="80">██╔══██╗</text>
  <text x="175" y="95">███████║</text>
  <text x="175" y="110">██╔══██║</text>
  <text x="175" y="125">██║  ██║</text>
  <text x="175" y="140">╚═╝  ╚═╝</text>
  
  <text x="280" y="65">██████╗ </text>
  <text x="280" y="80">██╔══██╗</text>
  <text x="280" y="95">██████╔╝</text>
  <text x="280" y="110">██╔══██╗</text>
  <text x="280" y="125">██║  ██║</text>
  <text x="280" y="140">╚═╝  ╚═╝</text>
  
  <text x="385" y="65">██████╗ </text>
  <text x="385" y="80">██╔══██╗</text>
  <text x="385" y="95">██║  ██║</text>
  <text x="385" y="110">██║  ██║</text>
  <text x="385" y="125">██████╔╝</text>
  <text x="385" y="140">╚═════╝</text>
  
  <text x="490" y="65">██╗</text>
  <text x="490" y="80">██║</text>
  <text x="490" y="95">██║</text>
  <text x="490" y="110">██║</text>
  <text x="490" y="125">██║</text>
  <text x="490" y="140">╚═╝</text>
  
  <text x="535" y="65">██╗  ██╗</text>
  <text x="535" y="80">██║ ██╔╝</text>
  <text x="535" y="95">█████╔╝ </text>
  <text x="535" y="110">██╔═██╗ </text>
  <text x="535" y="125">██║  ██╗</text>
  <text x="535" y="140">╚═╝  ╚═╝</text>
</g>

<!-- Glowing underline -->
<line x1="80" y1="155" x2="780" y2="155" stroke="#00ff88" stroke-width="2" class="slide-line"/>

<!-- MIGLANI subtitle -->
<text x="80" y="175" font-size="11" fill="#484f58" letter-spacing="8">M I G L A N I</text>

<!-- Info panel -->
<rect x="80" y="195" width="700" height="120" rx="4" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.2"/>

<g font-size="12">
  <g class="fade1">
    <text x="100" y="220" fill="#00ff88">▸ ROLE</text>
    <text x="220" y="220" fill="#c9d1d9">Senior TPM @ Kodo | Fintech &amp; Payments</text>
  </g>
  <g class="fade2">
    <text x="100" y="245" fill="#00ff88">▸ STACK</text>
    <text x="220" y="245" fill="#c9d1d9">Python • Node.js • SQL • REST APIs • AI Agents</text>
  </g>
  <g class="fade3">
    <text x="100" y="270" fill="#00ff88">▸ FOCUS</text>
    <text x="220" y="270" fill="#c9d1d9">Banking Infra • Card Issuance • Reconciliation • Treasury</text>
  </g>
  <g class="fade4">
    <text x="100" y="295" fill="#00ff88">▸ STATUS</text>
    <circle cx="228" cy="291" r="4" fill="#39d353" class="pulse"/>
    <text x="240" y="295" fill="#39d353">OPEN TO OPPORTUNITIES</text>
  </g>
</g>

<!-- Bottom bar -->
<g font-size="10" fill="#484f58">
  <text x="20" y="330">SYS:ONLINE</text>
  <text x="140" y="330">REPOS:11</text>
  <text x="260" y="330">STACK:TS/PY</text>
  <circle cx="380" cy="327" r="3" fill="#39d353" class="blink"/>
  <text x="390" y="330">ACTIVE</text>
  <text x="800" y="330" fill="#00ff88" class="blink">▮</text>
</g>

<!-- Floating particles -->
<circle cx="120" cy="300" r="1" fill="#00ff88" class="float"/>
<circle cx="350" cy="280" r="1" fill="#00ff88" style="animation: float 3s 0.5s infinite"/>
<circle cx="580" cy="310" r="1" fill="#00ff88" style="animation: float 4s 1s infinite"/>
<circle cx="720" cy="290" r="1" fill="#00ff88" style="animation: float 3.5s 1.5s infinite"/>

</svg>