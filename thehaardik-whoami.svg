<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400">
<defs>
  <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00ff88" stop-opacity="1"/>
    <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
  </linearGradient>
  <filter id="blur">
    <feGaussianBlur stdDeviation="2"/>
  </filter>
</defs>

<style>
  @keyframes scan { 0%{y:-10} 100%{y:410} }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  @keyframes glitch1 { 0%,90%,100%{transform:translate(0)} 92%{transform:translate(-3px,1px)} 94%{transform:translate(3px,-1px)} 96%{transform:translate(-1px,2px)} }
  @keyframes glitch2 { 0%,88%,100%{transform:translate(0)} 90%{transform:translate(2px,-1px)} 93%{transform:translate(-2px,1px)} 95%{transform:translate(1px,-2px)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes slideUp { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }
  @keyframes dataFlow { 0%{transform:translateY(0)} 100%{transform:translateY(-50px)} }
  .scan { animation: scan 3s linear infinite; }
  .pulse { animation: pulse 2s infinite; }
  .glitch1 { animation: glitch1 4s infinite; }
  .glitch2 { animation: glitch2 4s 0.1s infinite; }
  .blink { animation: blink 1s infinite; }
  .s1 { animation: slideUp 0.4s ease-out 0.6s forwards; opacity:0; }
  .s2 { animation: slideUp 0.4s ease-out 0.8s forwards; opacity:0; }
  .s3 { animation: slideUp 0.4s ease-out 1.0s forwards; opacity:0; }
  .s4 { animation: slideUp 0.4s ease-out 1.2s forwards; opacity:0; }
  .s5 { animation: slideUp 0.4s ease-out 1.4s forwards; opacity:0; }
  .dflow { animation: dataFlow 8s linear infinite; }
  text { font-family: 'Courier New', 'Lucida Console', monospace; }
</style>

<rect width="860" height="400" rx="8" fill="#060a10"/>

<!-- Matrix rain -->
<g font-size="10" fill="#00ff88" opacity="0.08">
  <text x="15" y="20" class="dflow">01001</text>
  <text x="15" y="40" class="dflow" style="animation-delay:1s">10110</text>
  <text x="15" y="60" class="dflow" style="animation-delay:2s">01101</text>
  <text x="15" y="80" class="dflow" style="animation-delay:3s">11001</text>
  <text x="15" y="100" class="dflow" style="animation-delay:4s">00110</text>
  <text x="15" y="120" class="dflow" style="animation-delay:5s">10101</text>
  <text x="15" y="140" class="dflow" style="animation-delay:6s">01011</text>
  <text x="30" y="30" class="dflow" style="animation-delay:0.5s">11010</text>
  <text x="30" y="50" class="dflow" style="animation-delay:1.5s">00101</text>
  <text x="30" y="70" class="dflow" style="animation-delay:2.5s">10011</text>
</g>
<g font-size="10" fill="#00ff88" opacity="0.08">
  <text x="810" y="20" class="dflow">10110</text>
  <text x="810" y="40" class="dflow" style="animation-delay:1.2s">01001</text>
  <text x="810" y="60" class="dflow" style="animation-delay:2.2s">11010</text>
  <text x="810" y="80" class="dflow" style="animation-delay:3.2s">00101</text>
  <text x="810" y="100" class="dflow" style="animation-delay:4.2s">10101</text>
  <text x="810" y="120" class="dflow" style="animation-delay:5.2s">01010</text>
  <text x="825" y="30" class="dflow" style="animation-delay:0.8s">01101</text>
  <text x="825" y="50" class="dflow" style="animation-delay:1.8s">10011</text>
</g>

<!-- Scan line -->
<rect x="0" y="0" width="860" height="3" fill="url(#glow)" opacity="0.15" class="scan"/>

<!-- Corners -->
<g stroke="#00ff88" stroke-width="2" fill="none" opacity="0.6">
  <path d="M20,20 L20,55 M20,20 L55,20"/>
  <path d="M840,20 L840,55 M840,20 L805,20"/>
  <path d="M20,380 L20,345 M20,380 L55,380"/>
  <path d="M840,380 L840,345 M840,380 L805,380"/>
</g>

<!-- HARDIK glitch -->
<g font-size="48" font-weight="bold" fill="#00ff88">
  <g class="glitch1" opacity="0.15"><text x="140" y="115" fill="#ff0040">HARDIK</text></g>
  <g class="glitch2" opacity="0.15"><text x="144" y="112" fill="#00f0ff">HARDIK</text></g>
  <text x="142" y="114" opacity="0.95">HARDIK</text>
</g>

<!-- MIGLANI -->
<g font-size="14" fill="#484f58" letter-spacing="12" opacity="0">
  <animate attributeName="opacity" from="0" to="0.7" dur="0.3s" begin="0.4s" fill="freeze"/>
  <text x="142" y="135">MIGLANI</text>
</g>

<!-- Underline -->
<line x1="142" y1="148" x2="420" y2="148" stroke="#00ff88" stroke-width="2" opacity="0">
  <animate attributeName="opacity" from="0" to="0.8" dur="0.3s" begin="0.5s" fill="freeze"/>
  <animate attributeName="x2" from="142" to="420" dur="0.5s" begin="0.5s" fill="freeze"/>
</line>
<line x1="142" y1="148" x2="420" y2="148" stroke="#00ff88" stroke-width="6" filter="url(#blur)" opacity="0">
  <animate attributeName="opacity" from="0" to="0.3" dur="0.3s" begin="0.5s" fill="freeze"/>
  <animate attributeName="x2" from="142" to="420" dur="0.5s" begin="0.5s" fill="freeze"/>
</line>

<!-- Hexagon -->
<g transform="translate(680, 100)" opacity="0">
  <animate attributeName="opacity" from="0" to="0.4" dur="0.5s" begin="0.6s" fill="freeze"/>
  <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#00ff88" stroke-width="1"/>
  <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="none" stroke="#00ff88" stroke-width="0.5"/>
  <circle cx="0" cy="0" r="3" fill="#00ff88" class="pulse"/>
  <animateTransform attributeName="transform" type="rotate" from="0 680 100" to="360 680 100" dur="20s" repeatCount="indefinite"/>
</g>

<!-- Panel -->
<rect x="80" y="165" width="700" height="170" rx="4" fill="#0a0e14" stroke="#1a2332" stroke-width="1"/>
<rect x="80" y="165" width="700" height="24" rx="4" fill="#0d1117"/>
<text x="95" y="181" font-size="10" fill="#484f58">PROFILE.SYS</text>
<circle cx="830" cy="177" r="4" fill="#39d353" class="pulse"/>
<text x="818" y="181" font-size="9" fill="#39d353">LIVE</text>

<!-- Rows -->
<g font-size="12">
  <g class="s1">
    <rect x="95" y="200" width="3" height="14" fill="#00ff88"/>
    <text x="108" y="211" fill="#00ff88">ROLE</text>
    <text x="175" y="211" fill="#c9d1d9">Technical Program Manager @ Kodo</text>
  </g>
  <g class="s2">
    <rect x="95" y="225" width="3" height="14" fill="#58a6ff"/>
    <text x="108" y="236" fill="#58a6ff">STACK</text>
    <text x="175" y="236" fill="#c9d1d9">Python • Node.js • SQL • REST APIs • AI Agents</text>
  </g>
  <g class="s3">
    <rect x="95" y="250" width="3" height="14" fill="#f0883e"/>
    <text x="108" y="261" fill="#f0883e">DOMAIN</text>
    <text x="175" y="261" fill="#c9d1d9">Fixed Income • Credit Cards • Prepaid Instruments</text>
  </g>
  <g class="s4">
    <rect x="95" y="275" width="3" height="14" fill="#bc8cff"/>
    <text x="108" y="286" fill="#bc8cff">INFRA</text>
    <text x="175" y="286" fill="#c9d1d9">Banking Infra • Connected Banking • Reconciliation</text>
  </g>
  <g class="s5">
    <rect x="95" y="300" width="3" height="14" fill="#f778ba"/>
    <text x="108" y="311" fill="#f778ba">STATUS</text>
    <text x="175" y="311" fill="#c9d1d9">Still learning, always building.</text>
  </g>
</g>

<!-- Bottom bar -->
<rect x="0" y="350" width="860" height="30" fill="#0a0e14" opacity="0.8"/>
<line x1="0" y1="350" x2="860" y2="350" stroke="#1a2332" stroke-width="1"/>
<g font-size="10" fill="#484f58">
  <text x="20" y="369">NODE:ACTIVE</text>
  <text x="140" y="369">REPOS:11</text>
  <text x="250" y="369">LANG:TS/PY</text>
  <circle cx="360" cy="366" r="3" fill="#39d353" class="blink"/>
  <text x="370" y="369" fill="#39d353">OPERATIONAL</text>
  <text x="790" y="369" fill="#00ff88" class="blink">▮</text>
</g>

</svg>